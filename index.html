<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Les Cròniques del Temps - Prehistòria</title>
<style>
  :root{
    --ui-dark:#24140d;
    --ui-mid:#5a321f;
    --ui-light:#e8c27a;
    --ui-gold:#f5d36c;
    --ink:#fff3cf;
    --danger:#d95b3d;
    --ok:#6ec17b;
    --shadow:rgba(0,0,0,.55);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b0705;color:var(--ink);font-family: Georgia, 'Times New Roman', serif;}
  button{font-family:inherit;}
  #game{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at center, #2b1b12 0%, #090604 70%);
  }
  .stage{
    position:relative;
    width:min(100vw, calc(100vh * 16 / 9));
    height:min(100vh, calc(100vw * 9 / 16));
    max-width:100vw; max-height:100vh;
    overflow:hidden;
    background:#1d130d;
    box-shadow:0 0 40px rgba(0,0,0,.85), inset 0 0 60px rgba(0,0,0,.45);
    border: min(.55vw,.55vh) solid #070402;
  }
  .scene{
    position:absolute; inset:0; overflow:hidden;
    background:#20110b;
  }
  .scene:before{content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,.25) 55%,rgba(0,0,0,.58)); z-index:1;}
  .scene:after{content:""; position:absolute; inset:-3%; pointer-events:none; background:radial-gradient(circle at center,transparent 45%,rgba(0,0,0,.55)); z-index:5;}

  /* Retro illustrated backgrounds made with CSS */
  .library{background:linear-gradient(#1b1320 0%,#2e1e20 48%,#27130b 49%,#160c08 100%);}
  .library .shelves{position:absolute;left:4%;right:4%;top:8%;height:48%;background:repeating-linear-gradient(90deg,#3a2115 0 4%,#27150d 4% 4.7%,#5a3920 4.7% 6.5%);border:4px solid #120906;box-shadow:inset 0 0 30px #000;}
  .library .floor{position:absolute;left:0;right:0;bottom:0;height:42%;background:repeating-linear-gradient(90deg,#3a2118 0 7%,#2b160e 7% 14%);transform:skewY(-2deg);transform-origin:left bottom;}
  .library .window{position:absolute;right:8%;top:10%;width:15%;height:28%;background:linear-gradient(#182338,#304f60);border:6px solid #110805;box-shadow:0 0 15px rgba(120,160,200,.25);}
  .library .forbidden{position:absolute;right:25%;top:16%;width:13%;height:34%;background:linear-gradient(90deg,#1b0f09,#4a2c18,#1c0f09);border:3px solid #0d0503;box-shadow:0 0 20px #000;}
  .library .book{position:absolute;right:29%;top:24%;width:5%;height:19%;background:linear-gradient(135deg,#1b1012,#58313c);border:3px solid #c49b4b;box-shadow:0 0 18px rgba(245,211,108,.55);transform:rotate(-4deg);z-index:3;}

  .classroom{background:linear-gradient(#26324a 0%,#4b2d24 50%,#2a1810 51%,#110b08 100%);}
  .classroom .board{position:absolute;left:8%;right:28%;top:12%;height:34%;background:#173b28;border:6px solid #6b4725;box-shadow:inset 0 0 22px #000;}
  .classroom .board:after{content:"DEURES D’HISTÒRIA";position:absolute;left:8%;top:18%;color:#dfe8d6;font-size:clamp(18px,3vw,38px);opacity:.9;}
  .classroom .desk{position:absolute;left:12%;bottom:20%;width:18%;height:12%;background:#6b3d20;border-radius:8px;box-shadow:0 10px 18px rgba(0,0,0,.45);}
  .classroom .teacherdesk{position:absolute;right:10%;bottom:24%;width:24%;height:14%;background:#70411f;border-radius:8px;box-shadow:0 10px 18px rgba(0,0,0,.45);}
  .classroom .window{position:absolute;right:9%;top:10%;width:15%;height:28%;background:linear-gradient(#1a223a,#405d73);border:6px solid #120906;box-shadow:0 0 15px rgba(120,160,200,.25);}

  .bookworld{background:radial-gradient(circle,#c98b43 0%,#81512e 32%,#2c160c 70%,#080403 100%);} 
  .bookworld .pages{position:absolute;left:20%;right:20%;top:20%;bottom:18%;background:linear-gradient(90deg,#cfa96c 0 48%,#8b6138 49% 51%,#d6b77a 52%);border-radius:4% 4% 8% 8%;box-shadow:0 0 35px #f3d27a, inset 0 0 30px #5c361d;transform:perspective(600px) rotateX(12deg);}
  .bookworld .runes{position:absolute;left:24%;right:24%;top:26%;height:30%;background:repeating-linear-gradient(0deg,transparent 0 14px,rgba(75,42,24,.5) 15px 18px);opacity:.8;}

  .valley{background:linear-gradient(#4d2734 0%,#b2623e 42%,#5b3d2a 43%,#272014 100%);}
  .valley .sun{position:absolute;right:12%;top:12%;width:9%;aspect-ratio:1;border-radius:50%;background:#f3b85b;box-shadow:0 0 25px #f5b95b;}
  .valley .mountains{position:absolute;left:-4%;right:-4%;top:28%;height:28%;background:linear-gradient(135deg,transparent 0 20%,#39281e 20% 35%,transparent 35% 48%,#4a3022 48% 70%,transparent 70%);}
  .valley .ground{position:absolute;left:0;right:0;bottom:0;height:48%;background:linear-gradient(#4c3b22,#21180e);}
  .valley .cave{position:absolute;left:8%;bottom:20%;width:25%;height:35%;background:radial-gradient(ellipse at center,#0a0604 35%,#3b2a1c 37%,#705033 70%);border-radius:48% 48% 22% 22%;box-shadow:inset 0 0 30px #000;}
  .valley .fire{position:absolute;left:42%;bottom:23%;width:6%;height:12%;background:radial-gradient(ellipse at bottom,#f7d266 0 28%,#e85c26 29% 55%,transparent 56%);filter:drop-shadow(0 0 12px #e87828);animation:flicker .7s infinite alternate;}
  .valley .mamut{position:absolute;right:12%;bottom:23%;width:20%;height:18%;background:#4e3529;border-radius:45% 50% 35% 35%;box-shadow:inset -12px -8px 0 rgba(0,0,0,.2);}
  .valley .mamut:before{content:"";position:absolute;left:-13%;top:30%;width:25%;height:35%;background:#4e3529;border-radius:50%;}
  .valley .mamut:after{content:"";position:absolute;left:-16%;top:54%;width:20%;height:5%;background:#e5d6bb;border-radius:50%;transform:rotate(24deg);}

  .camp{background:linear-gradient(#6d3940 0%,#ba7140 40%,#4c321f 41%,#1d140c 100%);}
  .camp .ground,.neolithic .ground,.metal .ground,.megalith .ground{position:absolute;left:0;right:0;bottom:0;height:45%;background:linear-gradient(#564021,#1e160d);}
  .tent{position:absolute;bottom:25%;width:18%;height:24%;background:linear-gradient(135deg,#8b633d,#382417);clip-path:polygon(50% 0,100% 100%,0 100%);filter:drop-shadow(0 10px 8px rgba(0,0,0,.4));}
  .tent.t1{left:12%}.tent.t2{left:30%;transform:scale(.8)}
  .paintwall{position:absolute;right:8%;top:12%;width:32%;height:43%;background:linear-gradient(135deg,#8b6642,#49321f);border-radius:12% 16% 8% 10%;box-shadow:inset 0 0 25px rgba(0,0,0,.5);}
  .paintwall:after{content:"𓃰 𐂂 𐂃 𐂂";position:absolute;left:12%;top:28%;font-size:clamp(20px,5vw,60px);color:#2b120a;opacity:.8;}

  .neolithic{background:linear-gradient(#5983a3 0%,#c49b58 44%,#49612f 45%,#1d190d 100%);} 
  .neolithic .field{position:absolute;left:0;right:0;bottom:0;height:45%;background:repeating-linear-gradient(100deg,#6a7132 0 5%,#94723b 5% 10%);}
  .hut{position:absolute;bottom:25%;width:16%;height:22%;background:#6d4a2d;border-radius:8% 8% 2% 2%;}
  .hut:before{content:"";position:absolute;left:-8%;right:-8%;top:-38%;height:45%;background:#8a6b39;clip-path:polygon(50% 0,100% 100%,0 100%);}
  .hut.h1{left:18%}.hut.h2{left:38%;transform:scale(.85)}

  .metal{background:linear-gradient(#5b515a 0%,#ab7045 45%,#2f251c 46%,#120c08 100%);} 
  .forge{position:absolute;left:16%;bottom:24%;width:25%;height:25%;background:#3a2417;border-radius:16% 16% 4% 4%;box-shadow:inset 0 0 20px #000;}
  .forge:after{content:"";position:absolute;left:32%;bottom:20%;width:34%;height:40%;background:radial-gradient(#ffd36a,#e8642d 55%,transparent 60%);filter:blur(1px);animation:flicker .7s infinite alternate;}
  .anvil{position:absolute;right:22%;bottom:28%;width:16%;height:10%;background:#56504c;clip-path:polygon(0 25%,30% 25%,35% 0,65% 0,70% 25%,100% 25%,80% 70%,20% 70%);}

  .megalith{background:linear-gradient(#2d2333 0%,#69505b 47%,#2c2b1f 48%,#11100c 100%);} 
  .stone{position:absolute;bottom:22%;width:9%;height:34%;background:linear-gradient(90deg,#494941,#838171,#403f38);border-radius:45% 45% 8% 8%;box-shadow:12px 0 16px rgba(0,0,0,.35);}
  .stone.s1{left:15%;transform:rotate(-8deg)}.stone.s2{left:29%;height:26%;transform:rotate(5deg)}.stone.s3{left:45%;height:38%;}.stone.s4{left:62%;height:29%;transform:rotate(7deg)}.stone.s5{left:76%;height:33%;transform:rotate(-5deg)}

  @keyframes flicker{from{transform:scale(.92) skewX(-2deg);opacity:.85}to{transform:scale(1.08) skewX(3deg);opacity:1}}

  .topbar{position:absolute;z-index:10;top:2.5%;left:2.5%;right:2.5%;display:flex;align-items:center;justify-content:space-between;gap:1vw;pointer-events:none;}
  .badge,.progress{background:rgba(31,16,9,.78);border:2px solid #8c5c2c;border-radius:14px;padding:.45em .7em;box-shadow:0 4px 12px var(--shadow);font-size:clamp(12px,1.5vw,18px);text-shadow:1px 2px #000;}
  .progress{min-width:110px;text-align:center;}

  .panel{position:absolute;z-index:12;left:50%;top:50%;transform:translate(-50%,-50%);width:min(86%,760px);max-height:86%;overflow:auto;background:rgba(35,19,12,.94);border:3px solid #b47b3d;border-radius:20px;padding:clamp(14px,2.8vw,28px);box-shadow:0 10px 40px rgba(0,0,0,.7), inset 0 0 25px rgba(255,197,100,.08);}
  .panel h1,.panel h2{margin:.1em 0 .45em;color:#ffd985;text-shadow:2px 3px #000;line-height:1.05;}
  .panel h1{font-size:clamp(28px,5vw,62px)}
  .panel h2{font-size:clamp(22px,3.2vw,42px)}
  .panel p,.panel li{font-size:clamp(16px,2.2vw,24px);line-height:1.35;}
  .menu-actions{display:flex;flex-wrap:wrap;gap:.7rem;margin-top:1rem;}
  .btn{cursor:pointer;border:2px solid #d7a65c;background:linear-gradient(#8d5a2d,#4f2d19);color:#ffe7a8;border-radius:14px;padding:.75em 1em;font-size:clamp(15px,2vw,22px);font-weight:bold;text-shadow:1px 2px #000;box-shadow:0 5px 0 #1b0f09,0 8px 14px rgba(0,0,0,.4);}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #1b0f09,0 4px 8px rgba(0,0,0,.4)}
  .btn.secondary{background:linear-gradient(#544137,#2f211b)}
  .btn.small{font-size:clamp(13px,1.6vw,18px);padding:.55em .75em;border-radius:10px;}

  .dialogue{position:absolute;z-index:20;left:2.5%;right:2.5%;bottom:2.5%;display:grid;grid-template-columns:1fr;gap:clamp(8px,1.5vw,16px);background:rgba(25,13,8,.96);border:3px solid #bc8243;border-radius:18px;padding:clamp(10px,1.7vw,18px);box-shadow:0 -8px 24px rgba(0,0,0,.45);cursor:pointer;}
  .portrait{display:none;}
  .portrait:before{content:"";position:absolute;left:27%;top:18%;width:46%;height:36%;background:#3c2218;border-radius:50% 50% 45% 45%;box-shadow:0 19px 0 #e8a66c;}
  .portrait:after{content:"";position:absolute;left:30%;top:50%;width:40%;height:30%;background:#355b68;border-radius:8px 8px 0 0;}
  .dialogue .name{color:#ffd985;font-weight:bold;font-size:clamp(14px,1.8vw,22px);margin-bottom:.25em;}
  .dialogue .text{font-size:clamp(16px,2.25vw,27px);line-height:1.25;text-shadow:1px 2px #000;}
  .continue-hint{opacity:.7;font-size:.75em;margin-top:.35em;text-align:right;}

  .activity{position:absolute;z-index:15;left:3%;right:3%;bottom:3%;top:12%;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .activity-card{pointer-events:auto;width:min(92%,850px);max-height:100%;overflow:auto;background:rgba(32,17,10,.92);border:3px solid #b47b3d;border-radius:18px;padding:clamp(12px,2vw,24px);box-shadow:0 12px 30px rgba(0,0,0,.55);}
  .activity-card h2{margin:.1em 0 .5em;color:#ffd985;font-size:clamp(20px,3vw,38px)}
  .activity-card p{font-size:clamp(15px,2vw,23px);line-height:1.35}
  .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(8px,1.3vw,14px);margin-top:.7rem;}
  .option,.item,.slot{background:rgba(95,53,28,.94);border:2px solid #c9944e;border-radius:13px;padding:.7em;color:#ffe8b3;font-size:clamp(14px,1.8vw,20px);cursor:pointer;text-align:center;box-shadow:0 4px 0 #221108;}
  .option.correct,.item.correct{background:rgba(55,113,63,.95);border-color:#91e299;}
  .option.wrong,.item.wrong{background:rgba(130,55,45,.95);border-color:#e28d78;}
  .items-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:clamp(7px,1.2vw,13px);}
  .item{min-height:clamp(58px,9vw,100px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.25em;}
  .item .emoji{font-size:clamp(26px,4vw,48px)}
  .memory-grid .item .emoji{font-size:clamp(15px,2.4vw,28px);line-height:1.12;overflow-wrap:anywhere;word-break:normal;}
  .memory-grid .item{min-height:clamp(54px,8vw,92px);padding:.45em;}
  .timeline{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin:.8rem 0;}
  .slot{min-width:130px;background:rgba(40,25,16,.95);}
  .slot.filled{background:rgba(86,56,33,.95)}
  .feedback{margin-top:.7rem;font-size:clamp(15px,1.9vw,22px);min-height:1.5em;color:#ffd985;}
  .hidden{display:none!important;}

  .credits-list{font-size:clamp(14px,1.8vw,20px);line-height:1.4;}

  @media (max-aspect-ratio: 4/5){
    .stage{width:100vw;height:100vh;border:0;}
    .options{grid-template-columns:1fr;}
    .items-grid{grid-template-columns:repeat(3,minmax(0,1fr));}
    .activity{top:9%;bottom:2%;}
    .dialogue{grid-template-columns:1fr;}
    .portrait{display:none;}
    .panel{width:94%;}
    .library .shelves{left:-8%;right:-8%;}
  }

  .scene.withImage{
    background-size:cover!important;
    background-position:center center!important;
    background-repeat:no-repeat!important;
  }
  .scene.withImage:before{
    background:linear-gradient(to bottom,rgba(0,0,0,.06),rgba(0,0,0,.18) 55%,rgba(0,0,0,.52));
  }
  .activity-card{
    backdrop-filter: blur(2px);
  }


  .iberian{background:linear-gradient(#517c9b 0%,#c98c51 44%,#6b4d2f 45%,#1c120b 100%);}
  .iberianInterior{background:linear-gradient(#6d8fa6 0%,#d19b5a 45%,#6b4328 46%,#20120a 100%);}

  .symbol-grid .item .emoji{
    font-size:clamp(15px,1.55vw,24px);
    line-height:1.12;
    max-width:100%;
    overflow-wrap:anywhere;
    word-break:normal;
    text-align:center;
  }
  .symbol-grid .item{
    min-height:clamp(64px,8vw,96px);
    padding:.45em;
  }
  @media (max-aspect-ratio: 4/5){
    .symbol-grid .item .emoji{
      font-size:clamp(13px,4.1vw,20px);
    }
  }


  .aqueduct-board{
    display:grid;
    grid-template-columns:repeat(5,minmax(0,1fr));
    gap:.55rem;
    margin:.8rem 0;
  }
  .aqueduct-slot{
    min-height:clamp(70px,9vw,112px);
    border:2px dashed #d7a65c;
    border-radius:12px;
    background:rgba(20,12,8,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ffe7a8;
    font-size:clamp(13px,1.5vw,18px);
    text-align:center;
  }
  .aqueduct-slot.filled{
    border-style:solid;
    background:rgba(70,46,28,.78);
  }
  .aqueduct-piece{
    cursor:grab;
    user-select:none;
    min-height:clamp(60px,8vw,96px);
    background:linear-gradient(#d7b37a,#9a7046);
    border:2px solid #6b4328;
    border-radius:12px;
    color:#2c160c;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 0 #2b160e;
    font-size:clamp(22px,3vw,38px);
  }
  .water-flow{
    height:12px;
    margin:.5rem 0;
    border-radius:999px;
    background:linear-gradient(90deg,#2b8bd8,#8bdcff);
    transform-origin:left;
    animation:waterGrow 1.2s ease-out forwards;
  }
  @keyframes waterGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @media (max-aspect-ratio: 4/5){
    .aqueduct-board{grid-template-columns:repeat(2,minmax(0,1fr));}
  }


.mosaic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin:1rem 0}
.mosaic-tile{min-height:90px;display:flex;align-items:center;justify-content:center;font-size:2rem;border:2px solid #d7a65c;border-radius:12px;background:rgba(70,46,28,.75);cursor:pointer}

  .shield-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.7rem;margin:1rem 0;}
  .shield-card{min-height:clamp(78px,10vw,120px);border:3px solid #d7a65c;border-radius:18px;background:linear-gradient(#6b2f2f,#2d1515);color:#ffe7a8;font-size:clamp(42px,5.5vw,70px);cursor:pointer;box-shadow:0 5px 0 #1b0f09;display:flex;align-items:center;justify-content:center;}
  .shield-card span{display:block;font-size:clamp(12px,1.5vw,18px);margin-top:.25em;}
  @media (max-aspect-ratio: 4/5){.shield-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}

.culture-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:220px;
}
.culture-card .culture-icon{
    font-size:clamp(2.2rem,4vw,3.5rem);
    margin-bottom:.35rem;
}
.culture-card .culture-label{
    font-size:clamp(1rem,2vw,1.5rem);
    line-height:1.1;
    text-align:center;
}

.culture-card .emoji{display:none!important;}
.culture-card{
    display:flex!important;
    flex-direction:column!important;
    align-items:center!important;
    justify-content:center!important;
    min-height:clamp(120px,14vw,170px)!important;
}
.culture-card .culture-icon{
    font-size:clamp(2.3rem,4vw,3.8rem)!important;
    line-height:1!important;
    margin-bottom:.45rem!important;
}
.culture-card .culture-label{
    font-size:clamp(1.05rem,1.6vw,1.45rem)!important;
    line-height:1.1!important;
    text-align:center!important;
    white-space:normal!important;
}


/* Versió mòbil: mostrar les imatges de fons senceres, sense retallar laterals */
@media (max-aspect-ratio: 4/5){
  body{
    background:#000!important;
  }
  .scene,
  .stage,
  #stage,
  .game,
  main{
    background-color:#000!important;
  }
  .bg,
  .background,
  .scene-bg,
  #scene,
  #bg,
  #background{
    background-size:contain!important;
    background-position:center center!important;
    background-repeat:no-repeat!important;
    background-color:#000!important;
  }
}
html.mobile-contain-bg body,
body.mobile-contain-bg{
  background:#000!important;
}
html.mobile-contain-bg [style*="background-image"]{
  background-size:contain!important;
  background-position:center center!important;
  background-repeat:no-repeat!important;
  background-color:#000!important;
}

</style>

<script>
(function(){
  function updateMobileContainMode(){
    var portrait = window.matchMedia('(max-aspect-ratio: 4/5)').matches;
    document.documentElement.classList.toggle('mobile-contain-bg', portrait);
    if(document.body){ document.body.classList.toggle('mobile-contain-bg', portrait); }
  }
  window.addEventListener('resize', updateMobileContainMode);
  window.addEventListener('orientationchange', updateMobileContainMode);
  document.addEventListener('DOMContentLoaded', updateMobileContainMode);
  updateMobileContainMode();
})();
</script>

</head>
<body>
<div id="game">
  <main class="stage" role="application" aria-label="Les Cròniques del Temps">
    <section id="scene" class="scene library">
      <div class="shelves"></div><div class="floor"></div><div class="window"></div><div class="forbidden"></div><div class="book"></div>
    </section>
    <div class="topbar">
      <div class="badge" id="chapterBadge">Les Cròniques del Temps</div>
      <div class="progress" id="progressBadge">Inici</div>
    </div>
    <div id="menu" class="panel"></div>
    <div id="dialogue" class="dialogue hidden" onclick="nextDialogue()">
      <div class="portrait"></div>
      <div><div class="name" id="speaker">Lia</div><div class="text" id="dialogueText"></div><div class="continue-hint">Clica per continuar</div></div>
    </div>
    <div id="activity" class="activity hidden"></div>
  </main>
</div>
<script>
const STORAGE_KEY='croniquesTempsSaveV2';
let state={step:'menu',prehistoriaDone:false,activityIndex:0};
let dialogueQueue=[];
let currentScene='library';

const sceneEl=document.getElementById('scene');
const menuEl=document.getElementById('menu');
const dialogueEl=document.getElementById('dialogue');
const activityEl=document.getElementById('activity');
const speakerEl=document.getElementById('speaker');
const dialogueTextEl=document.getElementById('dialogueText');
const chapterBadge=document.getElementById('chapterBadge');
const progressBadge=document.getElementById('progressBadge');

function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); updateBadges(); }
function load(){ try{const raw=localStorage.getItem(STORAGE_KEY); if(raw) state=JSON.parse(raw);}catch(e){} updateBadges(); }
function hasSavedProgress(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const saved=JSON.parse(raw);
    return saved && saved.step && saved.step!=='menu' && saved.step!=='intro';
  }catch(e){ return false; }
}

function setScene(name){
  currentScene=name;
  const visualName = (name==='libraryLibrarian'||name==='forbiddenShelf'||name==='bookClosed') ? 'library' : name;
  sceneEl.className='scene '+visualName;
  sceneEl.innerHTML='';
  sceneEl.style.backgroundImage='';
  sceneEl.classList.remove('withImage');

  if(SCENE_IMAGES[name]){
    sceneEl.classList.add('withImage');
    sceneEl.style.backgroundImage=`url("${SCENE_IMAGES[name]}")`;
  }

  const add=(cls)=>{const d=document.createElement('div');d.className=cls;sceneEl.appendChild(d)};

  // Si hi ha imatge pròpia, no cal reconstruir els decorats CSS excepte fallback automàtic.
  if(!SCENE_IMAGES[name]){
    if(visualName==='classroom'){['board','desk','teacherdesk','window'].forEach(add);}
    if(visualName==='library'){['shelves','floor','window','forbidden','book'].forEach(add);}

    if(visualName==='megalith'){add('ground'); ['stone s1','stone s2','stone s3','stone s4','stone s5'].forEach(add);}

function say(lines, after){
  hideAll(); dialogueQueue=lines.slice(); dialogueQueue.after=after; dialogueEl.classList.remove('hidden'); nextDialogue();
}
function nextDialogue(){
  if(!dialogueQueue.length){ const cb=dialogueQueue.after; dialogueEl.classList.add('hidden'); if(cb) cb(); return; }
  const line=dialogueQueue.shift(); speakerEl.textContent=line[0]; dialogueTextEl.textContent=line[1];
}

function activityReading(){
  setScene('valley'); hideAll(); activityEl.classList.remove('hidden');
  activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 1 · On he caigut?</h2><p><b>Llegeix:</b> La Prehistòria és l’etapa més antiga de la humanitat. Comença amb l’aparició dels primers éssers humans i acaba amb la invenció de l’escriptura. Es divideix en tres grans etapes: Paleolític, Neolític i Edat dels Metalls.</p><p><b>Pregunta:</b> Quin invent marca el final de la Prehistòria i l’inici de la Història?</p><div class="options"><button class="option" onclick="quizAnswer(this,false)">La roda</button><button class="option" onclick="quizAnswer(this,true)">L’escriptura</button><button class="option" onclick="quizAnswer(this,false)">El foc</button><button class="option" onclick="quizAnswer(this,false)">La ceràmica</button></div><div class="feedback" id="fb"></div></div>`;
}
function quizAnswer(btn,ok){
  const fb=document.getElementById('fb');
  btn.classList.add(ok?'correct':'wrong');
  if(ok){ fb.textContent='Correcte! La pàgina comença a ordenar-se.'; save(); setTimeout(()=>advance('camp_intro'),950); }
  else{ fb.textContent='No és aquesta. Pensa en quan comença la Història.'; save(); }
}
function activityObjects(){
  setScene('camp'); hideAll(); activityEl.classList.remove('hidden');
  const objects=[['🪨','Bifaç',1],['🔥','Foc',1],['📱','Mòbil',0],['🗡️','Espasa medieval',0],['🥩','Pell d’animal',1],['🖼️','Pintura rupestre',1],['🛞','Roda metàl·lica',0],['🫐','Fruits silvestres',1],['💰','Moneda romana',0],['🏹','Llança',1]];
  activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 2 · Caçadors i recol·lectors</h2><p>Clica només els objectes que encaixen amb el Paleolític. N’has de trobar 6.</p><div class="items-grid">${objects.map((o,i)=>`<button class="item" data-ok="${o[2]}" onclick="selectObject(this)"><span class="emoji">${o[0]}</span><span>${o[1]}</span></button>`).join('')}</div><div class="feedback" id="fb">Seleccionats: <span id="count">0</span>/6</div></div>`;
}
function selectObject(btn){
  if(btn.dataset.done) return;
  btn.dataset.done='1';
  const ok=btn.dataset.ok==='1';
  btn.classList.add(ok?'correct':'wrong');
  save();

  const selected=[...document.querySelectorAll('.item.correct')].length;
  const fb=document.getElementById('fb');
  if(selected>=6){
    fb.innerHTML='Molt bé! La tribu ja reconeix els objectes del Paleolític.<br><button class="btn small" onclick="advance(\'cave_intro\')">Continuar</button>';
  } else {
    fb.innerHTML=`Seleccionats: <span id="count">${selected}</span>/6`;
  }
}
function activityMemory(){
  setScene('cave'); hideAll(); activityEl.classList.remove('hidden');
  const pairs=[['Foc','🔥'],['Bifaç','🪓'],['Art rupestre','🐂'],['Menhir','🗿'],['Dolmen','🪨🪨'],['Mamut','🦣']];
  const cards=[];
  pairs.forEach((p,i)=>{cards.push({id:i,text:p[0]});cards.push({id:i,text:p[1]});});
  cards.sort(()=>Math.random()-.5);
  window.memoryOpen=[]; window.memoryFound=0;
  activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 3 · Memory prehistòric</h2><p>Relaciona cada concepte amb la seva imatge o símbol. Troba les 6 parelles.</p><div class="items-grid memory-grid">${cards.map((c,i)=>`<button class="item" data-id="${c.id}" data-text="${c.text}" onclick="memoryPick(this)"><span class="emoji">❔</span></button>`).join('')}</div><div class="feedback" id="fb">Parelles trobades: 0/6</div></div>`;
}
function memoryPick(btn){
  if(btn.dataset.done==='1' || window.memoryOpen.includes(btn)) return;
  btn.querySelector('.emoji').textContent=btn.dataset.text;
  window.memoryOpen.push(btn);
  if(window.memoryOpen.length===2){
    const [a,b]=window.memoryOpen;
    if(a.dataset.id===b.dataset.id){
      a.dataset.done=b.dataset.done='1';
      a.classList.add('correct'); b.classList.add('correct');

function activityAqueduct(){
  setScene('aqueducteRoma'); 
  hideAll(); 
  activityEl.classList.remove('hidden');

  const pieces=[
    {id:'river', label:'🌊', text:'Riu'},
    {id:'arch1', label:'①∩', text:'Arc 1'},
    {id:'arch2', label:'②∩', text:'Arc 2'},
    {id:'channel', label:'═', text:'Canal'},
    {id:'city', label:'🏛️', text:'Ciutat'}
  ].sort(()=>Math.random()-.5);

  activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 6 · Reconstrueix l’aqüeducte</h2>
  <p>Els romans feien arribar l’aigua a les ciutats amb grans construccions. Ordena les peces perquè l’aigua pugui avançar des del riu fins a la ciutat. Fixa’t bé en l’Arc 1 i l’Arc 2.</p>
  <div class="aqueduct-board">
    <div class="aqueduct-slot" data-need="river" ondragover="event.preventDefault()" ondrop="dropAqueduct(event,this)">1</div>
    <div class="aqueduct-slot" data-need="arch1" ondragover="event.preventDefault()" ondrop="dropAqueduct(event,this)">2</div>
    <div class="aqueduct-slot" data-need="arch2" ondragover="event.preventDefault()" ondrop="dropAqueduct(event,this)">3</div>
    <div class="aqueduct-slot" data-need="channel" ondragover="event.preventDefault()" ondrop="dropAqueduct(event,this)">4</div>
    <div class="aqueduct-slot" data-need="city" ondragover="event.preventDefault()" ondrop="dropAqueduct(event,this)">5</div>
  </div>
  <p><b>Peces:</b></p>
  <div class="timeline" id="aqueductPieces">${pieces.map(p=>`<div class="aqueduct-piece" draggable="true" id="aq_${p.id}" data-id="${p.id}" ondragstart="dragAqueduct(event)"><span>${p.label}</span><small style="font-size:.45em;margin-left:.4em;">${p.text}</small></div>`).join('')}</div>
  <div class="feedback" id="fb"></div>
  <button class="btn small" onclick="checkAqueduct()">Comprovar</button>
  <button class="btn small secondary" onclick="activityAqueduct()">Reiniciar</button>
  </div>`;
}

function dragAqueduct(ev){
  ev.dataTransfer.setData("text/plain", ev.target.id);
}

function dropAqueduct(ev,slot){
  ev.preventDefault();
  const id=ev.dataTransfer.getData("text/plain");
  const el=document.getElementById(id);
  if(!el) return;
  const existing=slot.querySelector('.aqueduct-piece');
  if(existing){
    document.getElementById('aqueductPieces').appendChild(existing);
  }
  slot.innerHTML='';
  slot.appendChild(el);
  slot.classList.add('filled');
}

function checkAqueduct(){
  const slots=[...document.querySelectorAll('.aqueduct-slot')];
  const ok=slots.every(s=>{
    const piece=s.querySelector('.aqueduct-piece');
    return piece && piece.dataset.id===s.dataset.need;
  });
  const fb=document.getElementById('fb');
  if(ok){
    fb.innerHTML=`Perfecte! L’aigua arriba a la ciutat.<div class="water-flow"></div><button class="btn small" onclick="advance('antiga_act7')">Continuar</button>`;
    save();
  }else{
    fb.innerHTML='Encara no. Pista: primer cal el riu, després l’Arc 1, després l’Arc 2, després el canal per on passa l’aigua i finalment la ciutat.';
  }
}

function renderRomanQuestion(){
 const q=rquestions[rq];
 activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 8 · Quiz romà</h2>
 <p><b>Pregunta ${rq+1}/5</b></p><p>${q[0]}</p>

function answerRoman(i){
 const q=rquestions[rq];
 const buttons=[...document.querySelectorAll('.item')];
 let fb=document.getElementById('fb');
 if(!fb){
   fb=document.createElement('div');
   fb.id='fb';
   fb.className='feedback';
   activityEl.querySelector('.activity-card').appendChild(fb);
 }
 if(i===q[2]){
  buttons.forEach(b=>b.disabled=true);
  buttons[i].classList.add('correct');
  rs++;
  fb.textContent='Correcte!';
  setTimeout(()=>{
    rq++;
    if(rq<5) renderRomanQuestion();
    else{
      activityEl.innerHTML=`<div class="activity-card"><h2>Quiz completat</h2>
      <p>Has encertat ${rs} de 5 preguntes.</p>
      <button class="btn" onclick="advance('antiga_act9')">Continuar</button></div>`;
    }
  },650);
 }else{

  buttons[i].disabled=true;
  fb.textContent='No és aquesta. Torna-ho a provar.';
 }
}

  document.getElementById('breadOrder').innerHTML=window.breadOrder.map(x=>`<div class="slot filled">${x}</div>`).join('');
  const ok=JSON.stringify(window.breadOrder)===JSON.stringify(['Sembrar','Collir','Moldre','Fer pa','Menjar']); const fb=document.getElementById('fb');
  if(window.breadOrder.length<5) fb.textContent=window.breadOrder.length+'/5';
  else fb.innerHTML=ok ? '🍞 Perfecte! Ara saps com arribava el pa a les taules medievals.<br><button class="btn small" onclick="advance(\'medieval_act9\')">Continuar</button>' : 'L’ordre no és correcte.<br><button class="btn small" onclick="activityBreadOrder()">Tornar a provar</button>';
}
function activityJobsQuiz(){
  setScene('pobleMedieval');
  startSimpleQuiz('Activitat 9 · Descobrim els oficis',[
    ['Qui feia el pa?',['Ferrer','Forner','Pastor','Moliner'],1],
    ['Qui treballava el ferro?',['Pagès','Ferrer','Forner','Pastor'],1],
    ['Qui cuidava les ovelles?',['Ferrer','Pastor','Moliner','Forner'],1],
    ['Qui transformava el gra en farina?',['Pagès','Ferrer','Moliner','Forner'],2]
  ],'🔨 Has conegut els principals oficis dels pobles medievals.',()=>advance('cultures_intro'));
}
function culturesIntro(){
  setScene('tresCultures');
  say([['Lia','Aquest lloc sembla diferent de tot el que he vist fins ara.'],['Narrador','Durant una part de l’Edat Mitjana, a la Península Ibèrica van conviure persones de cultures i religions diferents.'],['Narrador','Cristians, musulmans i jueus compartien ciutats, mercats, oficis i coneixements.'],['Lia','Tots junts en una mateixa ciutat?'],['Narrador','No sempre va ser fàcil, però van deixar una empremta molt important en la nostra història.']],()=>advance('medieval_act10'));
}
function activityThreeCultures(){
  setScene('tresCultures'); hideAll(); activityEl.classList.remove('hidden'); const pairs=[['✝️','Cristians','⛪ Església'],['🕌','Musulmans','🕌 Mesquita'],['✡️','Jueus','✡️ Sinagoga']]; window.cultureCorrect=0;
  activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 10 · Les tres cultures</h2><p>Relaciona cada cultura amb el seu lloc de culte.</p><div class="items-grid">${pairs.map(p=>`<button class="item culture-card" data-answer="${p[2]}" onclick="askCulturePlace(this)"><span class="culture-icon">${p[0]}</span><span class="culture-label">${p[1]}</span></button>`).join('')}</div><div class="feedback" id="fb">Tria una cultura.</div></div>`;
}
function askCulturePlace(btn){
  if(btn.dataset.done) return; const answer=btn.dataset.answer, opts=['⛪ Església','🕌 Mesquita','✡️ Sinagoga'].sort(()=>Math.random()-.5);
  document.getElementById('fb').innerHTML=`Quin lloc de culte correspon?<div class="options">${opts.map(o=>`<button class="option" onclick="answerCulturePlace(this,'${o}','${answer}')">${o}</button>`).join('')}</div>`; window.currentCultureBtn=btn;
}
function answerCulturePlace(btn,a,good){
  const fb=document.getElementById('fb');
  if(a===good){btn.classList.add('correct'); window.currentCultureBtn.classList.add('correct'); window.currentCultureBtn.dataset.done='1'; window.cultureCorrect++; if(window.cultureCorrect>=3) fb.innerHTML='🌍 Molt bé! Has identificat els principals llocs de culte de les tres cultures.<br><button class="btn small" onclick="advance(\'medieval_act11\')">Continuar</button>'; else fb.textContent=`Correcte! Relacions resoltes: ${window.cultureCorrect}/3`;}
  else {btn.classList.add('wrong'); fb.textContent='No és aquesta.';}
}
function activityMedievalMarket(){
  setScene('tresCultures'); hideAll(); activityEl.classList.remove('hidden');
  const items=[['🍞','Pa',1],['📱','Mòbil',0],['🫒','Oli',1],['💻','Ordinador',0],['🍯','Mel',1],['🚗','Cotxe',0],['🧵','Teles',1],['🎮','Consola',0],['🏺','Ceràmica',1],['🔋','Pila',0]];
  activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 11 · El mercat medieval</h2><p>Selecciona només els productes que podries trobar en un mercat medieval.</p><div class="items-grid">${items.map(o=>`<button class="item" data-ok="${o[2]}" onclick="selectMarketItem(this)"><span class="emoji">${o[0]}</span><span>${o[1]}</span></button>`).join('')}</div><div class="feedback" id="fb">Seleccionats: 0/5</div></div>`;
}
function selectMarketItem(btn){
  if(btn.dataset.done) return; btn.dataset.done='1'; const ok=btn.dataset.ok==='1'; btn.classList.add(ok?'correct':'wrong'); const selected=[...document.querySelectorAll('.item.correct')].length, fb=document.getElementById('fb');
  if(ok && selected>=5) fb.innerHTML='🛍️ Perfecte! Has descobert alguns dels productes que es venien als mercats medievals.<br><button class="btn small" onclick="advance(\'medieval_act12\')">Continuar</button>'; else fb.innerHTML= ok ? `Seleccionats: ${selected}/5` : 'Aquest producte no encaixa amb un mercat medieval.';
}
function activitySharedKnowledge(){
  setScene('tresCultures'); hideAll(); activityEl.classList.remove('hidden');
  const items=[['📜','Paper',1],['🌐','Internet',0],['⭐','Astronomia',1],['💡','Electricitat',0],['➕','Matemàtiques',1],['📱','Smartphone',0],['⚕️','Medicina',1],['🚀','Coet espacial',0]];
  activityEl.innerHTML=`<div class="activity-card"><h2>Activitat 12 · Coneixements compartits</h2><p>Selecciona els coneixements o objectes que sí podien existir o difondre’s a l’Edat Mitjana.</p><div class="items-grid">${items.map(o=>`<button class="item" data-ok="${o[2]}" onclick="selectKnowledge(this)"><span class="emoji">${o[0]}</span><span>${o[1]}</span></button>`).join('')}</div><div class="feedback" id="fb">Seleccionats: 0/4</div></div>`;
}
function selectKnowledge(btn){
  if(btn.dataset.done) return; btn.dataset.done='1'; const ok=btn.dataset.ok==='1'; btn.classList.add(ok?'correct':'wrong'); const selected=[...document.querySelectorAll('.item.correct')].length, fb=document.getElementById('fb');
  if(ok && selected>=4) fb.innerHTML='📚 Molt bé! Les diferents cultures també compartien coneixements.<br><button class="btn small" onclick="advance(\'medieval_act13\')">Continuar</button>'; else fb.innerHTML= ok ? `Seleccionats: ${selected}/4` : 'Aquest element és massa modern per a l’Edat Mitjana.';
}
function activityMedievalFinalQuiz(){
  setScene('tresCultures');
  startSimpleQuiz('Activitat 13 · Quiz final de l’Edat Mitjana',[
    ['Quines tres cultures van conviure a la Península Ibèrica?',['Cristians, musulmans i jueus','Romans, grecs i fenicis','Vikings, egipcis i romans','Nobles, pagesos i cavallers'],0],
    ['Com s’anomena el lloc de culte musulmà?',['Sinagoga','Mesquita','Església','Temple romà'],1],
    ['Com s’anomena el lloc de culte jueu?',['Sinagoga','Mesquita','Catedral','Monestir'],0],
    ['On comprava la gent productes i aliments?',['Mercat','Castell','Torre','Muralla'],0],
    ['Què van compartir sovint aquestes cultures?',['Coneixements i productes','Cotxes','Electricitat','Ordinadors'],0]
  ],'Has completat el quiz final de l’Edat Mitjana.',()=>advance('medieval_end'));
}
function medievalEnd(){
  setScene('retornBiblioteca');
  say([['Narrador','La Lia ha recorregut milers d’anys d’història. Ha conegut els primers pobladors, els ibers, els romans, els castells medievals i les ciutats plenes de vida.'],['Lia','Quan vaig obrir aquest llibre no imaginava que la història fos tan interessant.'],['Lia','Però ara necessito una mica de temps per pensar en tot el que he après.'],['Narrador','El llibre resta obert damunt la taula. Encara queden moltes pàgines per descobrir.'],['Lia','Ho sé... però crec que encara no estic preparada. Continuaré aquest viatge el proper curs.']],()=>{ hideAll(); menuEl.classList.remove('hidden'); menuEl.innerHTML=`<h2>Fi de la primera part de l’aventura</h2><p>La Lia ha completat la Prehistòria, l’Edat Antiga i l’Edat Mitjana.</p><p><b>Continuarà explorant la història el proper curs...</b></p><div class="menu-actions"><button class="btn" onclick="showMainMenu()">Tornar a l’inici</button></div>`; });
}
function startSimpleQuiz(title,questions,finalText,after){
  hideAll(); activityEl.classList.remove('hidden'); window.simpleQuiz={title,questions,finalText,after,index:0,score:0}; renderSimpleQuiz();
}
function renderSimpleQuiz(){
  const q=window.simpleQuiz.questions[window.simpleQuiz.index]; const opts=q[1].map((t,i)=>({t,ok:i===q[2]})).sort(()=>Math.random()-.5);
  activityEl.innerHTML=`<div class="activity-card"><h2>${window.simpleQuiz.title}</h2><p><b>Pregunta ${window.simpleQuiz.index+1}/${window.simpleQuiz.questions.length}</b></p><p>${q[0]}</p><div class="options">${opts.map(o=>`<button class="option" onclick="answerSimpleQuiz(this,${o.ok})">${o.t}</button>`).join('')}</div><div class="feedback" id="fb"></div></div>`;
}
function answerSimpleQuiz(btn,ok){
  const fb=document.getElementById('fb');
  if(ok){
    [...document.querySelectorAll('.option')].forEach(b=>b.disabled=true);
    btn.classList.add('correct');
    window.simpleQuiz.score++;
    fb.textContent='Correcte!';
    setTimeout(()=>{
      window.simpleQuiz.index++;
      if(window.simpleQuiz.index>=window.simpleQuiz.questions.length){
        activityEl.innerHTML=`<div class="activity-card"><h2>Repte completat</h2><p>Has encertat ${window.simpleQuiz.score} de ${window.simpleQuiz.questions.length} preguntes.</p><p>${window.simpleQuiz.finalText}</p><div class="menu-actions"><button class="btn" onclick="window.simpleQuiz.after()">Continuar</button></div></div>`;
      }else{
        renderSimpleQuiz();
      }
    },650);
  }else{
    btn.classList.add('wrong');
    btn.disabled=true;
    fb.textContent='No és aquesta. Torna-ho a provar.';
  }
}

load(); showMainMenu();
